<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trung bình 5 số</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:flex-start;
height:100vh;
margin:50px;
color:white;
}

.panel{
background:#1e293b;
padding:30px 40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
width:420px;
}

h2{
text-align:center;
margin-top:0;
margin-bottom:20px;
font-weight:normal;
}

.row{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

input{
width:60px;
height:55px;
font-size:22px;
text-align:center;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 0 2px #38bdf8;
}

#o6{
background:#2563eb;
}

.result{
background:red;
font-weight:bold;
}

textarea{
width:100%;
height:120px;
background:#020617;
color:#38bdf8;
border:none;
border-radius:8px;
padding:10px;
font-size:16px;
resize:none;
}

.label{
font-size:14px;
opacity:0.8;
margin-bottom:6px;
}


</style>
</head>

<body>

<div class="panel">

<h2>Trung bình 5 số</h2>

<div class="row">
<input id="o1" readonly>
<input id="o2" readonly>
<input id="o3" readonly>
<input id="o4" readonly>
<input id="o5" readonly>
</div>

<div class="row">
<input id="o6" maxlength="1" autocomplete="off">
<input id="kq" class="result" readonly placeholder="TB">
<input id="state" class="state" readonly>
</div>

<div class="label">Dãy số đã rời khỏi ô1</div>
<textarea id="log"></textarea>

</div>

<script>

const boxes=[
document.getElementById("o1"),
document.getElementById("o2"),
document.getElementById("o3"),
document.getElementById("o4"),
document.getElementById("o5")
]

const input6=document.getElementById("o6")
const result=document.getElementById("kq")
const state=document.getElementById("state")
const logBox=document.getElementById("log")

window.onload=()=>{
input6.focus()
}

input6.addEventListener("input",function(){

let v=this.value

if(!/^[0-9]$/.test(v)){
this.value=""
return
}

let removed=boxes[0].value

for(let i=0;i<4;i++){
boxes[i].value=boxes[i+1].value
}

boxes[4].value=v

if(removed!==""){
logBox.value+=removed
}

let sum=0
let count=0

boxes.forEach(b=>{
if(b.value!==""){
sum+=Number(b.value)
count++
}
})

let avg = count ? (sum/count) : 0

result.value = count ? avg.toFixed(2) : ""

// hiển thị lớn / nhỏ
if(count>0){
if(avg>=5){
state.value="LỚN"
}else{
state.value="NHỎ"
}
}

this.value=""
this.focus()

})

</script>

</body>
</html>
