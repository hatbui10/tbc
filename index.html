<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trung bình động</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:flex-start;
height:100vh;
margin:50px;
color:white;
}

.panel{
background:#1e293b;
padding:30px 40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
width:460px;
}

h2{
text-align:center;
margin-top:0;
margin-bottom:20px;
}

.row{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

input{
width:60px;
height:55px;
font-size:22px;
text-align:center;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 0 2px #38bdf8;
}

#o6{
background:#2563eb;
}

.result{
background:red;
font-weight:bold;
}

.state{
font-weight:bold;
font-size:20px;
}

/* hiệu ứng nhấp nháy */
@keyframes blink{
0%{transform:scale(1);filter:brightness(1);}
50%{transform:scale(1.08);filter:brightness(1.6);}
100%{transform:scale(1);filter:brightness(1);}
}

.lon{
background:#111FA2;
animation:blink 0.8s infinite;
box-shadow:0 0 15px #22c55e;
}

.nho{
background:#2C2C2C;
animation:blink 0.8s infinite;
box-shadow:0 0 15px #ef4444;
}

textarea{
width:100%;
height:120px;
background:#020617;
color:#38bdf8;
border:none;
border-radius:8px;
padding:10px;
font-size:16px;
resize:none;
}

.label{
font-size:14px;
opacity:0.8;
margin-bottom:6px;
}


.control{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:20px;
}

.control label{
font-size:15px;
opacity:0.9;
}

.control input{
width:70px;
height:38px;
border-radius:8px;
border:none;
text-align:center;
font-size:16px;
background:#0f172a;
color:#38bdf8;
box-shadow:0 0 0 1px #334155 inset;
}

.control input:focus{
outline:none;
box-shadow:0 0 0 2px #38bdf8;
}

.control button{
padding:9px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
transition:0.25s;
}

.control button:hover{
background:#3b82f6;
transform:translateY(-1px);
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}






</style>
</head>

<body>

<div class="panel">

<h2>Trung bình động</h2>

<div class="control">

<label>Số ô trung bình</label>

<input type="number" id="count" value="5" min="2" max="20">

<button onclick="createBoxes()">Tạo</button>

</div>


<div id="boxes" class="row"></div>

<div class="row">
<input id="inputBox" maxlength="1" class="box">
<input id="avg" class="result box" readonly placeholder="TB">
<input id="state" class="state box" readonly>
</div>

<textarea id="log"></textarea>

</div>

<script>

let boxes=[]
const container=document.getElementById("boxes")
const inputBox=document.getElementById("inputBox")
const avgBox=document.getElementById("avg")
const stateBox=document.getElementById("state")
const logBox=document.getElementById("log")

function createBoxes(){

container.innerHTML=""
boxes=[]

let n=parseInt(document.getElementById("count").value)

for(let i=0;i<n;i++){

let input=document.createElement("input")
input.className="box"
input.readOnly=true

container.appendChild(input)
boxes.push(input)

}

inputBox.focus()

}

createBoxes()

inputBox.addEventListener("input",function(){

let v=this.value

if(!/^[0-9]$/.test(v)){
this.value=""
return
}

let removed=boxes[0].value

for(let i=0;i<boxes.length-1;i++){
boxes[i].value=boxes[i+1].value
}

boxes[boxes.length-1].value=v

if(removed!=""){
logBox.value+=removed
}

let sum=0
let count=0

boxes.forEach(b=>{
if(b.value!=""){
sum+=Number(b.value)
count++
}
})

let avg=count?sum/count:0

avgBox.value=count?avg.toFixed(2):""

stateBox.classList.remove("lon","nho")

if(count){

if(avg>=5){
stateBox.value="LỚN"
stateBox.classList.add("lon")
}else{
stateBox.value="NHỎ"
stateBox.classList.add("nho")
}

}

this.value=""
this.focus()

})

</script>

</body>
</html>
