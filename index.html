<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<title>OCR Tool</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  text-align: center;
  padding: 20px;
}

select, button, input {
  margin: 6px;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
}

textarea {
  width: 95%;
  height: 120px;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h3>OCR + Phân loại số</h3>

<input type="file" id="upload" accept="image/*" multiple>

<br>

<select id="lengthSelect">
  <option value="4">4 số</option>
  <option value="5" selected>5 số</option>
  <option value="6">6 số</option>
</select>

<button id="ocrBtn">OCR</button>
<button id="processBtn">Xử lý</button>

<p id="status"></p>

<canvas id="canvas" style="display:none;"></canvas>

<h4>Tất cả (<span id="countAll">0</span>)</h4>
<textarea id="all" readonly></textarea>
<button onclick="copy('all')">Copy</button>

<h4>>=5 (<span id="countGreater">0</span>)</h4>
<textarea id="greater" readonly></textarea>
<button onclick="copy('greater')">Copy</button>

<h4><5 (<span id="countLess">0</span>)</h4>
<textarea id="less" readonly></textarea>
<button onclick="copy('less')">Copy</button>

  
<h4>Xuất hiện cả 2 (<span id="countBoth">0</span>)</h4>
<textarea id="both" readonly></textarea>
<button onclick="copy('both')">Copy</button>

  
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let allNumbers = "";

/* 🔥 FORMAT 20 SỐ / DÒNG */
function format20(arr) {
  let result = [];
  for (let i = 0; i < arr.length; i += 20) {
    // slice 20 số, nối bằng ", " và **thêm dấu , ở cuối**
    let line = arr.slice(i, i + 20).join(", ") + ",";
    result.push(line);
  }
  return result.join("\n");
}

/* OCR */
document.getElementById("ocrBtn").onclick = async () => {
  let files = Array.from(document.getElementById("upload").files).slice(0, 100);

  if (files.length === 0) return;

  allNumbers = "";

  for (let i = 0; i < files.length; i++) {
    document.getElementById("status").textContent = `OCR ${i+1}/${files.length}`;

    let img = new Image();
    img.src = URL.createObjectURL(files[i]);

    await new Promise(r => img.onload = r);

    let sx = img.width * 0.35;
    let sw = img.width * 0.3;

    canvas.width = sw;
    canvas.height = img.height;

    ctx.drawImage(img, sx, 0, sw, img.height, 0, 0, sw, img.height);

    let result = await Tesseract.recognize(canvas, 'eng');
    let nums = result.data.text.replace(/[^0-9]/g, "");

    allNumbers += nums;
  }

  document.getElementById("status").textContent = "OCR xong 😏";
};

/* XỬ LÝ */
document.getElementById("processBtn").onclick = () => {
  if (!allNumbers) return;

  let len = parseInt(document.getElementById("lengthSelect").value);

  let arr = allNumbers.split("").reverse();

  let sequences = [];
for (let i = 0; i <= arr.length - len; i++) {
  sequences.push(arr.slice(i, i + len).join(""));
}

/* 🔥 XÓA TRÙNG */
sequences = [...new Set(sequences)];

  let greater = [];
  let less = [];

  for (let i = 0; i < sequences.length - 1; i++) {
    let current = `"${sequences[i]}"`;
    let next = sequences[i + 1];

    
    let lastDigit = parseInt(next[next.length - 1]);

    if (lastDigit >= 5) {
      greater.push(current);
    } else {
      less.push(current);
    }
  }

  greater = [...new Set(greater)];
less = [...new Set(less)];

  // Sau khi đã có greater và less (đã lọc trùng trong từng array)
let both = [];

// Tìm số xuất hiện ở cả 2
greater.forEach(num => {
  if (less.includes(num)) {
    both.push(num);
  }
});

// Loại bỏ số trùng khỏi greater và less
greater = greater.filter(num => !both.includes(num));
less = less.filter(num => !both.includes(num));

// Loại trùng trong both
both = [...new Set(both)];

// Gán vào textarea
document.getElementById("greater").value = greater.join(", ");
document.getElementById("less").value = less.join(", ");
document.getElementById("both").value = both.join(", ");

// Cập nhật đếm
document.getElementById("countGreater").textContent = greater.length;
document.getElementById("countLess").textContent = less.length;
document.getElementById("countBoth").textContent = both.length;
  

  /* 🔥 FORMAT 20 SỐ / DÒNG */
  document.getElementById("all").value =
    format20(sequences.map(s => `"${s}"`));

  document.getElementById("greater").value =
    format20(greater);

  document.getElementById("less").value =
    format20(less);

  /* đếm */
  document.getElementById("countAll").textContent = sequences.length;
  document.getElementById("countGreater").textContent = greater.length;
  document.getElementById("countLess").textContent = less.length;

  document.getElementById("status").textContent = "Xong 😎";
};

/* copy */
function copy(id) {
  let el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
